{% extends "base.html" %}
{% block title %}{{ feature }} · PRO · Muscu Tracker{% endblock %}

{% block content %}
<div class="vip-wall">
  <div class="vip-wall-icon">
    <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h2 class="vip-wall-title">{{ feature }} <span class="badge-pro">PRO</span></h2>
  <p class="vip-wall-text">
    {{ message|default("Cette fonctionnalité est réservée aux membres PRO. Contacte l'admin pour débloquer.") }}
  </p>
  <a href="{{ url_for('accueil.index') }}" class="btn primary" style="text-decoration:none; display:inline-block;">Retour à l'accueil</a>
</div>
{% endblock %}
