{% extends "base.html" %}
{% block title %}Arcade · Muscu PRO{% endblock %}

{% block head_extra %}
  <style>
    .game-tabs { display:flex; gap:8px; margin-bottom:14px; }
    .game-tabs button {
      flex:1; padding:10px; border-radius:10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      color: var(--text); cursor:pointer;
      font-size:0.8rem; letter-spacing:1px; font-weight:700;
    }
    .game-tabs button.active {
      background: linear-gradient(135deg, rgba(88,204,255,0.15), rgba(0,255,127,0.10));
      border-color: var(--accent); color: var(--accent);
    }
    .game-wrap { display:none; }
    .game-wrap.on { display:block; }
    .game-wrap canvas {
      width: 100%; height: auto; max-width: 360px;
      display: block; margin: 0 auto;
      border-radius: 10px; background: #050A18;
      touch-action: none; -webkit-tap-highlight-color: transparent;
    }
  </style>
{% endblock %}

{% block content %}
  <h1>🕹️ Arcade</h1>

  <div class="card">
    <div class="game-tabs">
      <button id="tab-flappy" class="active" onclick="showGame('flappy')">💪 MUSCLE FLAPPY</button>
      <button id="tab-crusher" onclick="showGame('crusher')">🏋️ REP CRUSHER</button>
    </div>

    <div id="game-flappy" class="game-wrap on">
      <canvas id="flappyCanvas" width="360" height="540" style="border:2px solid #FF453A;"></canvas>
    </div>

    <div id="game-crusher" class="game-wrap">
      <canvas id="repCanvas" width="360" height="540" style="border:2px solid #00FF7F;"></canvas>
    </div>
  </div>

  <script>
    function showGame(g) {
      document.getElementById('game-flappy').classList.toggle('on', g === 'flappy');
      document.getElementById('game-crusher').classList.toggle('on', g === 'crusher');
      document.getElementById('tab-flappy').classList.toggle('active', g === 'flappy');
      document.getElementById('tab-crusher').classList.toggle('active', g === 'crusher');
    }

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    /* ─────────────── MUSCLE FLAPPY ─────────────── */
    (function() {
      const canvas = document.getElementById('flappyCanvas');
      const ctx = canvas.getContext('2d');
      canvas.style.touchAction = 'none';

      let biceps = { x:60, y:200, w:35, h:35,
        gravity: isMobile ? 0.15 : 0.35, velocity:0,
        lift: isMobile ? -5.5 : -7.5, maxVelocity:8 };
      let pipes = [], frameCount = 0, score = 0;
      let gameOver = false, gameStarted = false;
      let baseSpeed = isMobile ? 1.2 : 2.5;
      let record = parseInt(localStorage.getItem('muscleFlappyRecord') || 0);

      function reset() { biceps.y=200; biceps.velocity=0; pipes=[]; score=0; frameCount=0; gameOver=false; gameStarted=false; }
      function handleAction(e) {
        e.preventDefault();
        if (gameOver) reset();
        else if (!gameStarted) { gameStarted = true; biceps.velocity = biceps.lift; }
        else biceps.velocity = biceps.lift;
      }
      canvas.addEventListener('mousedown', handleAction);
      canvas.addEventListener('touchstart', handleAction, {passive:false});
      canvas.addEventListener('touchend', e => e.preventDefault(), {passive:false});
      canvas.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

      function draw() {
        ctx.fillStyle = '#050A18';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "40px Arial";
        ctx.fillText("💪", biceps.x, biceps.y);

        if (gameStarted && !gameOver) {
          biceps.velocity += biceps.gravity;
          biceps.velocity = Math.min(biceps.velocity, biceps.maxVelocity);
          biceps.y += biceps.velocity;

          let currentSpeed = baseSpeed + (Math.floor(score / 20) * 0.1);
          let spawnInterval = isMobile ? 220 : 280;
          if (frameCount % spawnInterval === 0) {
            let gap = 220, minTop = 100, maxTop = canvas.height - gap - 100;
            let topH = Math.floor(Math.random() * (maxTop - minTop)) + minTop;
            pipes.push({ x: canvas.width, topH: topH, gap: gap, passed: false });
          }
          for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= currentSpeed;
            ctx.fillStyle = "#FF453A";
            ctx.fillRect(pipes[i].x, 0, 65, pipes[i].topH);
            ctx.fillRect(pipes[i].x, pipes[i].topH + pipes[i].gap, 65, canvas.height);
            ctx.fillStyle = '#AA0000';
            ctx.fillRect(pipes[i].x, pipes[i].topH - 25, 65, 25);
            ctx.fillRect(pipes[i].x, pipes[i].topH + pipes[i].gap, 65, 25);

            let bLeft = biceps.x - 10, bRight = biceps.x + 20;
            let bTop = biceps.y - 15, bBottom = biceps.y + 15;
            if (bRight > pipes[i].x && bLeft < pipes[i].x + 65) {
              if (bTop < pipes[i].topH || bBottom > pipes[i].topH + pipes[i].gap) gameOver = true;
            }
            if (!pipes[i].passed && biceps.x > pipes[i].x + 65) { score++; pipes[i].passed = true; }
            if (pipes[i].x < -80) pipes.splice(i, 1);
          }
          if (biceps.y > canvas.height - 20 || biceps.y < 20) gameOver = true;
        } else if (!gameStarted) {
          ctx.fillStyle = "white"; ctx.font = "bold 22px Arial";
          ctx.fillText("MUSCLE FLAPPY", 100, 260);
          ctx.font = "16px Arial"; ctx.fillText("Clique pour démarrer", 105, 300);
        }
        if (gameOver) {
          if (score > record) { record = score; localStorage.setItem('muscleFlappyRecord', record); }
          ctx.fillStyle = "rgba(255,69,58,0.8)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "white"; ctx.font = "bold 32px Arial";
          ctx.fillText("GAME OVER", 95, 250);
          ctx.font = "18px Arial";
          ctx.fillText("Score: " + score, 140, 300);
          ctx.fillText("Record: " + record, 135, 330);
          ctx.font = "15px Arial";
          ctx.fillText("Clique pour recommencer", 95, 380);
        }
        ctx.font = "bold 22px Arial";
        ctx.fillStyle = "#00FF7F"; ctx.fillText("⚡ " + score, 25, 40);
        ctx.fillStyle = "#FFD700"; ctx.fillText("🏆 " + record, 270, 40);
        frameCount++;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ─────────────── REP CRUSHER ─────────────── */
    (function() {
      const canvas2 = document.getElementById('repCanvas');
      const ctx2 = canvas2.getContext('2d');
      canvas2.style.touchAction = 'none';

      let barbell = { x: 140, y: 470, w: 100, h: 12 };
      let plates = [], score = 0, combo = 0;
      let maxCombo = parseInt(localStorage.getItem('repCrusherMaxCombo') || 0);
      let gameOver = false, gameStarted = false, frameCount = 0;
      let speed = isMobile ? 1 : 2, mouseX = 180;
      const colors = ['#FF453A','#00FF7F','#58CCFF','#FFD700','#FF00FF','#FFA500'];

      function reset() {
        barbell = { x: 140, y: 470, w: 100, h: 12 };
        plates = []; score = 0; combo = 0;
        gameOver = false; gameStarted = false; frameCount = 0;
        speed = isMobile ? 1 : 2;
      }
      function spawnPlate() {
        plates.push({
          x: Math.random() * (canvas2.width - 120) + 60,
          y: -40, w: 50, h: 35,
          color: colors[Math.floor(Math.random() * colors.length)],
          caught: false
        });
      }
      function handleMouseDown(e) {
        e.preventDefault();
        if (gameOver) reset();
        else if (!gameStarted) { gameStarted = true; spawnPlate(); }
      }
      canvas2.addEventListener('mousedown', handleMouseDown);
      canvas2.addEventListener('touchstart', handleMouseDown, {passive:false});
      canvas2.addEventListener('mousemove', e => {
        if (gameStarted && !gameOver) {
          const rect = canvas2.getBoundingClientRect();
          mouseX = e.clientX - rect.left;
          barbell.x = mouseX - barbell.w / 2;
          barbell.x = Math.max(10, Math.min(barbell.x, canvas2.width - barbell.w - 10));
        }
      });
      canvas2.addEventListener('touchmove', e => {
        e.preventDefault();
        if (gameStarted && !gameOver) {
          const rect = canvas2.getBoundingClientRect();
          const touch = e.touches[0];
          mouseX = touch.clientX - rect.left;
          barbell.x = mouseX - barbell.w / 2;
          barbell.x = Math.max(10, Math.min(barbell.x, canvas2.width - barbell.w - 10));
        }
      }, {passive:false});

      function draw() {
        ctx2.fillStyle = '#050A18';
        ctx2.fillRect(0, 0, canvas2.width, canvas2.height);

        if (gameStarted && !gameOver) {
          speed = (isMobile ? 1 : 2) + (score / 25);
          if (frameCount % Math.max(45, 90 - score * 1.5) === 0) spawnPlate();

          for (let i = plates.length - 1; i >= 0; i--) {
            let plate = plates[i];
            if (!plate.caught) {
              plate.y += speed;
              if (plate.y + plate.h > barbell.y && plate.y < barbell.y + barbell.h &&
                  plate.x + plate.w > barbell.x && plate.x < barbell.x + barbell.w) {
                plate.caught = true; score++; combo++;
                maxCombo = Math.max(combo, maxCombo);
                localStorage.setItem('repCrusherMaxCombo', maxCombo);
              }
              if (plate.y > canvas2.height) {
                plates.splice(i, 1);
                if (combo > 0) combo = 0;
                if (score > 0) gameOver = true;
                continue;
              }
            } else {
              plate.y = barbell.y - plate.h - 2;
              plate.x = barbell.x + barbell.w / 2 - plate.w / 2;
            }
            ctx2.fillStyle = plate.color;
            ctx2.fillRect(plate.x, plate.y, plate.w, plate.h);
            ctx2.fillStyle = 'rgba(0,0,0,0.3)';
            ctx2.fillRect(plate.x + 6, plate.y + 6, plate.w - 12, plate.h - 12);
            ctx2.fillStyle = 'white';
            ctx2.font = 'bold 14px Arial';
            ctx2.fillText('20kg', plate.x + 10, plate.y + 22);
          }

          ctx2.fillStyle = '#00FF7F';
          ctx2.fillRect(barbell.x, barbell.y, barbell.w, barbell.h);
          ctx2.fillStyle = '#00AA00';
          ctx2.fillRect(barbell.x - 12, barbell.y - 8, 12, 28);
          ctx2.fillRect(barbell.x + barbell.w, barbell.y - 8, 12, 28);

          if (combo >= 3) {
            ctx2.fillStyle = '#FFD700';
            ctx2.font = 'bold 18px Arial';
            ctx2.fillText('🔥 x' + combo, canvas2.width/2 - 30, 75);
          }
        } else if (!gameStarted) {
          ctx2.fillStyle = 'white';
          ctx2.font = 'bold 20px Arial';
          ctx2.fillText('REP CRUSHER', 110, 250);
          ctx2.font = '14px Arial';
          ctx2.fillText('Clique pour démarrer', 105, 290);
        }
        if (gameOver) {
          ctx2.fillStyle = 'rgba(255, 69, 58, 0.85)';
          ctx2.fillRect(0, 0, canvas2.width, canvas2.height);
          ctx2.fillStyle = 'white';
          ctx2.font = 'bold 28px Arial';
          ctx2.fillText('DISQUE RATÉ !', 90, 240);
          ctx2.font = '16px Arial';
          ctx2.fillText('Reps: ' + score, 145, 290);
          ctx2.fillText('Max Combo: ' + maxCombo, 120, 320);
          ctx2.font = '14px Arial';
          ctx2.fillText('Clique pour recommencer', 95, 370);
        }
        ctx2.font = 'bold 20px Arial';
        ctx2.fillStyle = '#00FF7F'; ctx2.fillText('💪 ' + score, 20, 38);
        ctx2.fillStyle = '#FFD700'; ctx2.fillText('🔥 ' + combo, 20, 63);
        ctx2.fillStyle = '#58CCFF'; ctx2.fillText('🏆 ' + maxCombo, 270, 38);
        frameCount++;
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
{% endblock %}
