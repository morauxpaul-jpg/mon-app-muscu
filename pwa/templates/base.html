<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050A18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Muscu PRO">
  <title>{% block title %}Muscu Tracker PRO{% endblock %}</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/icons.css">
  <link rel="stylesheet" href="/static/css/tutorial.css">
  <script defer src="/static/js/alpine.min.js"></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% include "_icons.html" ignore missing %}
  {% if is_authenticated %}
  <div class="topbar">
    <span class="topbar-user label-icon"><svg class="icon icon-sm icon-mute"><use href="/static/img/icons.svg#user"/></svg>{{ current_user_email }}</span>
    <form method="post" action="/logout" style="margin:0;">
      <button type="submit" class="btn topbar-logout label-icon" title="Déconnexion"><svg class="icon icon-sm"><use href="/static/img/icons.svg#log-out"/></svg>Déconnexion</button>
    </form>
  </div>
  {% endif %}

  <main class="app page-fade">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" data-tuto="welcome">
    <a href="/accueil" data-tuto="dashboard" class="{% if active == 'accueil' %}active{% endif %}"><svg class="icon nav-icon"><use href="/static/img/icons.svg#home"/></svg>Accueil</a>
    <a href="/seance"  data-tuto="seance"    class="{% if active == 'seance'  %}active{% endif %}"><svg class="icon nav-icon"><use href="/static/img/icons.svg#dumbbell"/></svg>Séance</a>
    <a href="/progres" data-tuto="progres"   class="{% if active == 'progres' %}active{% endif %}"><svg class="icon nav-icon"><use href="/static/img/icons.svg#chart-line"/></svg>Progrès</a>
    <a href="/plus"    data-tuto="plus"      class="{% if active == 'plus'    %}active{% endif %}"><svg class="icon nav-icon"><use href="/static/img/icons.svg#grid"/></svg>Plus</a>
  </nav>

  <script src="/static/js/sw-register.js"></script>
  <script src="/static/js/offline.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/tutorial.js"></script>
  <script src="/static/js/ui-fx.js"></script>
  <script>
    // Alpine.js fallback: if Alpine not loaded after 3s, show fallback message
    (function() {
      var fallbacks = document.querySelectorAll('.alpine-fallback');
      if (!fallbacks.length) return;
      var timer = setTimeout(function() {
        fallbacks.forEach(function(el) { el.style.display = 'flex'; });
      }, 3000);
      document.addEventListener('alpine:init', function() {
        clearTimeout(timer);
        fallbacks.forEach(function(el) { el.style.display = 'none'; });
      });
    })();
  </script>
  {% if is_authenticated %}
  <script>initTutorial();</script>
  <script>
    // Patch notes modal — affiche les nouveautés une seule fois par version.
    // Utilise lastSeenVersion pour comparer avec la version du changelog.
    // Si le SW vient de reloader (pending_changelog flag), affiche immédiatement.
    (function() {
      function esc(s) {
        return String(s).replace(/[&<>"']/g, function(c) {
          return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
        });
      }
      function renderItem(c, idx, demos) {
        var text, demoKey = null;
        if (typeof c === 'string') { text = c; }
        else { text = c.text || ''; demoKey = c.demo || null; }
        var btn = '';
        if (demoKey && demos && demos[demoKey]) {
          btn = ' <button type="button" data-demo-key="' + esc(demoKey) + '" class="patch-demo-btn" ' +
                'style="margin-left:6px;padding:2px 10px;border-radius:999px;border:1px solid var(--accent,#58CCFF);background:rgba(88,204,255,0.12);color:var(--accent,#58CCFF);font-size:0.72rem;font-weight:700;cursor:pointer;vertical-align:middle;">Voir</button>';
        }
        return '<li>' + esc(text) + btn + '</li>';
      }
      function showChangelog() {
        fetch('/static/changelog.json?_=' + Date.now())
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function(data) {
            var currentVersion = data.version;
            try {
              var seen = localStorage.getItem('lastSeenVersion');
              if (seen === currentVersion) return;
            } catch(e) { return; }
            try { localStorage.removeItem('pending_changelog'); } catch(e) {}
            var demos = data.demos || {};
            var items = (data.changes || []).map(function(c, i) { return renderItem(c, i, demos); }).join('');
            var html = '<div style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);" id="patchnotes-modal">' +
              '<div style="background:#0B1428;border:2px solid var(--accent,#58CCFF);border-radius:14px;padding:18px;max-width:360px;width:calc(100vw - 32px);color:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-height:80vh;overflow-y:auto;" onclick="event.stopPropagation()">' +
              '<h3 style="color:var(--accent,#58CCFF);margin:0 0 4px;">\ud83c\udf89 ' + esc(data.title) + '</h3>' +
              '<div style="font-size:0.75rem;color:var(--text-dim,#8899aa);margin-bottom:12px;">' + esc(data.date) + '</div>' +
              '<ul style="padding-left:18px;margin:0 0 14px;font-size:0.88rem;line-height:1.7;">' + items + '</ul>' +
              '<button id="patchnotes-ok" style="width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent,#58CCFF),#0077AA);color:#001;font-weight:700;font-size:0.9rem;cursor:pointer;">OK, compris !</button>' +
              '</div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
            var modal = document.getElementById('patchnotes-modal');
            modal.querySelector('#patchnotes-ok').addEventListener('click', function() {
              try { localStorage.setItem('lastSeenVersion', currentVersion); } catch(e) {}
              modal.remove();
            });
            modal.querySelectorAll('.patch-demo-btn').forEach(function(btn) {
              btn.addEventListener('click', function() {
                var key = btn.getAttribute('data-demo-key');
                var demo = demos[key];
                if (!demo) return;
                try { localStorage.setItem('lastSeenVersion', currentVersion); } catch(e) {}
                var payload = { url: demo.url || null, steps: demo.steps || [] };
                if (demo.url && location.pathname !== demo.url) {
                  try { sessionStorage.setItem('pending_demo', JSON.stringify(payload)); } catch(e) {}
                  modal.remove();
                  location.href = demo.url;
                } else {
                  modal.remove();
                  if (typeof window.playFeatureDemo === 'function') {
                    setTimeout(function() { window.playFeatureDemo(payload.steps); }, 200);
                  }
                }
              });
            });
          })
          .catch(function() {});
      }
      var pending = false;
      try { pending = localStorage.getItem('pending_changelog') === '1'; } catch(e) {}
      if (pending) {
        showChangelog();
      } else {
        setTimeout(showChangelog, 2000);
      }
    })();
  </script>
  <script>
    // Demande de permission notifications (une seule fois)
    (function() {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'default') return;
      try { if (localStorage.getItem('notif_asked')) return; } catch(e) {}
      // Attendre 5s après le chargement pour ne pas gêner
      setTimeout(function() {
        Notification.requestPermission().then(function() {
          try { localStorage.setItem('notif_asked', '1'); } catch(e) {}
        });
      }, 5000);
    })();
  </script>
  {% endif %}
  {% block scripts %}{% endblock %}
</body>
</html>
