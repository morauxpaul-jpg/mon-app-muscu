<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050A18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Muscu PRO">
  <title>{% block title %}Muscu Tracker PRO{% endblock %}</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/tutorial.css">
  <script defer src="/static/js/alpine.min.js"></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% if is_authenticated %}
  <div class="topbar">
    <span class="topbar-user">👤 {{ current_user_email }}</span>
    <form method="post" action="/logout" style="margin:0;">
      <button type="submit" class="btn topbar-logout" title="Déconnexion">⎋ Déconnexion</button>
    </form>
  </div>
  {% endif %}

  <main class="app">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" data-tuto="welcome">
    <a href="/accueil"   data-tuto="dashboard"  class="{% if active == 'accueil'   %}active{% endif %}"><span class="icon">🏠</span>Accueil</a>
    <a href="/seance"    data-tuto="seance"     class="{% if active == 'seance'    %}active{% endif %}"><span class="icon">💪</span>Séance</a>
    <a href="/progres"   data-tuto="progres"    class="{% if active == 'progres'   %}active{% endif %}"><span class="icon">📈</span>Progrès</a>
    <a href="/plus"      data-tuto="plus"       class="{% if active == 'plus'      %}active{% endif %}"><span class="icon">📋</span>Plus</a>
  </nav>

  <script src="/static/js/sw-register.js"></script>
  <script src="/static/js/offline.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/tutorial.js"></script>
  <script>
    // Alpine.js fallback: if Alpine not loaded after 3s, show fallback message
    (function() {
      var fallbacks = document.querySelectorAll('.alpine-fallback');
      if (!fallbacks.length) return;
      var timer = setTimeout(function() {
        fallbacks.forEach(function(el) { el.style.display = 'flex'; });
      }, 3000);
      document.addEventListener('alpine:init', function() {
        clearTimeout(timer);
        fallbacks.forEach(function(el) { el.style.display = 'none'; });
      });
    })();
  </script>
  {% if is_authenticated %}
  <script>initTutorial();</script>
  <script>
    // Patch notes modal — affiche les nouveautés une seule fois par version.
    // Utilise lastSeenVersion pour comparer avec la version du changelog.
    // Si le SW vient de reloader (pending_changelog flag), affiche immédiatement.
    (function() {
      function showChangelog() {
        fetch('/static/changelog.json?_=' + Date.now())
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function(data) {
            var currentVersion = data.version;
            try {
              var seen = localStorage.getItem('lastSeenVersion');
              if (seen === currentVersion) return;
            } catch(e) { return; }
            // Nettoyer le flag pending
            try { localStorage.removeItem('pending_changelog'); } catch(e) {}
            var html = '<div style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);" id="patchnotes-modal">' +
              '<div style="background:#0B1428;border:2px solid var(--accent,#58CCFF);border-radius:14px;padding:18px;max-width:340px;width:calc(100vw - 32px);color:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-height:80vh;overflow-y:auto;" onclick="event.stopPropagation()">' +
              '<h3 style="color:var(--accent,#58CCFF);margin:0 0 4px;">\ud83c\udf89 ' + data.title + '</h3>' +
              '<div style="font-size:0.75rem;color:var(--text-dim,#8899aa);margin-bottom:12px;">' + data.date + '</div>' +
              '<ul style="padding-left:18px;margin:0 0 14px;font-size:0.88rem;line-height:1.6;">' +
              data.changes.map(function(c) { return '<li>' + c + '</li>'; }).join('') +
              '</ul>' +
              '<button onclick="try{localStorage.setItem(\'lastSeenVersion\',\'' + currentVersion + '\')}catch(e){} document.getElementById(\'patchnotes-modal\').remove()" style="width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent,#58CCFF),#0077AA);color:#001;font-weight:700;font-size:0.9rem;cursor:pointer;">OK, compris !</button>' +
              '</div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
          })
          .catch(function() {});
      }
      // Si le SW vient de reloader la page, afficher immédiatement
      var pending = false;
      try { pending = localStorage.getItem('pending_changelog') === '1'; } catch(e) {}
      if (pending) {
        showChangelog();
      } else {
        // Sinon attendre 2s pour laisser le SW se stabiliser
        setTimeout(showChangelog, 2000);
      }
    })();
  </script>
  <script>
    // Demande de permission notifications (une seule fois)
    (function() {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'default') return;
      try { if (localStorage.getItem('notif_asked')) return; } catch(e) {}
      // Attendre 5s après le chargement pour ne pas gêner
      setTimeout(function() {
        Notification.requestPermission().then(function() {
          try { localStorage.setItem('notif_asked', '1'); } catch(e) {}
        });
      }, 5000);
    })();
  </script>
  {% endif %}
  {% block scripts %}{% endblock %}
</body>
</html>
