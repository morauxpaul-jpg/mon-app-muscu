<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050A18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Muscu PRO">
  <title>{% block title %}Muscu Tracker PRO{% endblock %}</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/components.css">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <main class="app">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav">
    <a href="/"          class="{% if active == 'accueil'   %}active{% endif %}"><span class="icon">🏠</span>Accueil</a>
    <a href="/seance"    class="{% if active == 'seance'    %}active{% endif %}"><span class="icon">💪</span>Séance</a>
    <a href="/programme" class="{% if active == 'programme' %}active{% endif %}"><span class="icon">⚙️</span>Prog.</a>
    <a href="/progres"   class="{% if active == 'progres'   %}active{% endif %}"><span class="icon">📈</span>Progrès</a>
    <a href="/gestion"   class="{% if active == 'gestion'   %}active{% endif %}"><span class="icon">🛠️</span>Gestion</a>
    <a href="/arcade"    class="{% if active == 'arcade'    %}active{% endif %}"><span class="icon">🎮</span>Arcade</a>
  </nav>

  <script src="/static/js/sw-register.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
