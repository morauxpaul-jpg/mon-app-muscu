<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0c12">
  <title>Erreur {{ code }} — Muscu Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/static/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/icons.css">
  <style>
    .err-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; text-align:center; }
    .err-code {
      font-size:4.2rem; font-weight:500; margin:0 0 4px;
      color:var(--text-1);
      font-variant-numeric: tabular-nums;
    }
    .err-title { font-size:var(--text-lg); margin:0 0 14px; color:var(--text-1); font-weight:500; }
    .err-msg { color:var(--text-2); font-size:var(--text-base); max-width:360px; line-height:1.5; margin:0 0 28px; }
    .err-actions { display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px; }
    .err-actions a.btn-primary {
      background:var(--accent);
      color:#fff; font-weight:500; padding:12px 18px; border-radius:var(--radius-md);
      text-decoration:none; font-size:var(--text-base);
    }
    .err-actions a.btn-report {
      color:var(--text-3); font-size:var(--text-sm);
      text-decoration:underline; padding:6px;
    }
  </style>
</head>
<body>
  <main class="err-wrap">
    <div class="err-code">{{ code }}</div>
    <h1 class="err-title">{% if code == 404 %}Page introuvable{% else %}Oups, quelque chose a cassé{% endif %}</h1>
    <p class="err-msg">{{ message }}</p>
    <div class="err-actions">
      <a href="/accueil" class="btn-primary label-icon" style="justify-content:center;"><svg class="icon icon-sm"><use href="/static/img/icons.svg#home"/></svg>Retour à l'accueil</a>
      <a href="mailto:moraux.paul@gmail.com?subject=Muscu%20Tracker%20—%20Erreur%20{{ code }}&body=Bonjour,%0D%0A%0D%0AJ'ai%20rencontré%20une%20erreur%20{{ code }}%20dans%20l'application.%0D%0A%0D%0ADescription%20:%20" class="btn-report">Signaler un problème</a>
    </div>
  </main>
</body>
</html>
