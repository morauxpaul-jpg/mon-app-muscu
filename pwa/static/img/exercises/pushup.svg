<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="28" cy="42" r="5" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso (angled, plank position) -->
  <line x1="33" y1="44" x2="72" y2="54" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Arms (bent, pushing) -->
  <line x1="35" y1="44" x2="32" y2="56" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="32" y1="56" x2="32" y2="72" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Hands on ground -->
  <line x1="28" y1="72" x2="36" y2="72" stroke="#58CCFF" stroke-width="2"/>
  <!-- Legs -->
  <line x1="72" y1="54" x2="80" y2="70" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Feet -->
  <line x1="78" y1="70" x2="82" y2="72" stroke="#58CCFF" stroke-width="2"/>
  <!-- Ground line -->
  <line x1="18" y1="74" x2="88" y2="74" stroke="#2a5a8c" stroke-width="1" opacity="0.5"/>
  <!-- Arrow showing push direction -->
  <path d="M22 58 L22 48 M19 51 L22 48 L25 51" stroke="#58CCFF" stroke-width="1.5" opacity="0.4"/>
</svg>
