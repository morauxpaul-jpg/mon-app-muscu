<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bar at top -->
  <line x1="20" y1="14" x2="80" y2="14" stroke="#2a5a8c" stroke-width="3"/>
  <!-- Supports -->
  <line x1="22" y1="8" x2="22" y2="14" stroke="#2a5a8c" stroke-width="2"/>
  <line x1="78" y1="8" x2="78" y2="14" stroke="#2a5a8c" stroke-width="2"/>
  <!-- Head -->
  <circle cx="50" cy="26" r="6" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Arms reaching up to bar -->
  <line x1="44" y1="24" x2="38" y2="14" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="56" y1="24" x2="62" y2="14" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso -->
  <line x1="50" y1="32" x2="50" y2="58" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Legs hanging -->
  <line x1="50" y1="58" x2="44" y2="78" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="50" y1="58" x2="56" y2="78" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Feet -->
  <line x1="42" y1="78" x2="46" y2="82" stroke="#58CCFF" stroke-width="2"/>
  <line x1="54" y1="78" x2="58" y2="82" stroke="#58CCFF" stroke-width="2"/>
  <!-- Arrow showing pull direction -->
  <path d="M72 34 L72 20 M69 23 L72 20 L75 23" stroke="#58CCFF" stroke-width="1.5" opacity="0.5"/>
</svg>
