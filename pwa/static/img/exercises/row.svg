<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="35" cy="28" r="6" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso bent forward -->
  <line x1="38" y1="33" x2="55" y2="50" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Legs -->
  <line x1="55" y1="50" x2="52" y2="70" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="55" y1="50" x2="62" y2="68" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="52" y1="70" x2="50" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="62" y1="68" x2="64" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Feet -->
  <line x1="46" y1="82" x2="54" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="60" y1="82" x2="68" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Arms pulling bar up -->
  <line x1="40" y1="38" x2="38" y2="52" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="38" y1="52" x2="44" y2="52" stroke="#58CCFF" stroke-width="2"/>
  <line x1="46" y1="42" x2="50" y2="52" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="50" y1="52" x2="44" y2="52" stroke="#58CCFF" stroke-width="2"/>
  <!-- Barbell -->
  <line x1="34" y1="52" x2="56" y2="52" stroke="#58CCFF" stroke-width="3"/>
  <!-- Arrow showing pull direction -->
  <path d="M45 58 L45 48 M42 51 L45 48 L48 51" stroke="#58CCFF" stroke-width="1.5" opacity="0.5"/>
</svg>
