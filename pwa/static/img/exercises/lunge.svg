<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="48" cy="18" r="6" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso (upright) -->
  <line x1="48" y1="24" x2="48" y2="48" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Arms at sides -->
  <line x1="45" y1="30" x2="38" y2="46" stroke="#58CCFF" stroke-width="2"/>
  <line x1="51" y1="30" x2="58" y2="46" stroke="#58CCFF" stroke-width="2"/>
  <!-- Front leg (bent) -->
  <line x1="48" y1="48" x2="34" y2="60" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="34" y1="60" x2="32" y2="80" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="28" y1="80" x2="36" y2="80" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Back leg (extended) -->
  <line x1="48" y1="48" x2="62" y2="60" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="62" y1="60" x2="72" y2="74" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="70" y1="74" x2="76" y2="78" stroke="#58CCFF" stroke-width="2"/>
  <!-- Back knee near ground -->
  <circle cx="62" cy="61" r="2" fill="#58CCFF" opacity="0.3"/>
</svg>
