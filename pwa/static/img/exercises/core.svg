<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Plank position -->
  <!-- Head -->
  <circle cx="24" cy="38" r="5" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso (straight plank) -->
  <line x1="29" y1="40" x2="72" y2="48" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Forearms on ground -->
  <line x1="30" y1="40" x2="28" y2="52" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="28" y1="52" x2="36" y2="56" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Legs -->
  <line x1="72" y1="48" x2="82" y2="56" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Feet -->
  <line x1="80" y1="56" x2="84" y2="58" stroke="#58CCFF" stroke-width="2"/>
  <!-- Ground -->
  <line x1="14" y1="58" x2="90" y2="58" stroke="#2a5a8c" stroke-width="1" opacity="0.5"/>
  <!-- Abs highlight (glow zone) -->
  <ellipse cx="50" cy="44" rx="14" ry="5" stroke="#58CCFF" stroke-width="1" opacity="0.25" fill="#58CCFF" fill-opacity="0.08"/>
</svg>
