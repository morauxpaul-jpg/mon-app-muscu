<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="50" cy="22" r="7" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso (slightly leaning forward) -->
  <line x1="50" y1="29" x2="47" y2="52" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Upper legs (squatting) -->
  <line x1="47" y1="52" x2="36" y2="62" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="47" y1="52" x2="58" y2="62" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Lower legs -->
  <line x1="36" y1="62" x2="38" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="58" y1="62" x2="56" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Feet -->
  <line x1="34" y1="82" x2="42" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="52" y1="82" x2="60" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Bar across shoulders -->
  <line x1="32" y1="30" x2="68" y2="30" stroke="#58CCFF" stroke-width="3"/>
  <!-- Arms holding bar -->
  <line x1="50" y1="34" x2="38" y2="30" stroke="#58CCFF" stroke-width="2"/>
  <line x1="50" y1="34" x2="62" y2="30" stroke="#58CCFF" stroke-width="2"/>
  <!-- Weight plates -->
  <rect x="27" y="25" width="5" height="10" rx="1" fill="#58CCFF" opacity="0.3" stroke="#58CCFF" stroke-width="1"/>
  <rect x="68" y="25" width="5" height="10" rx="1" fill="#58CCFF" opacity="0.3" stroke="#58CCFF" stroke-width="1"/>
</svg>
