<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="42" cy="25" r="6" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Torso (bent forward ~45°) -->
  <line x1="44" y1="31" x2="54" y2="52" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Upper legs -->
  <line x1="54" y1="52" x2="48" y2="68" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="54" y1="52" x2="60" y2="68" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Lower legs -->
  <line x1="48" y1="68" x2="46" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="60" y1="68" x2="58" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Feet -->
  <line x1="42" y1="82" x2="50" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="54" y1="82" x2="62" y2="82" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Arms hanging to bar -->
  <line x1="46" y1="36" x2="42" y2="72" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="48" y1="38" x2="58" y2="72" stroke="#58CCFF" stroke-width="2.5"/>
  <!-- Barbell on ground -->
  <line x1="32" y1="74" x2="68" y2="74" stroke="#58CCFF" stroke-width="3"/>
  <circle cx="30" cy="74" r="6" stroke="#58CCFF" stroke-width="1.5" fill="#58CCFF" opacity="0.15"/>
  <circle cx="70" cy="74" r="6" stroke="#58CCFF" stroke-width="1.5" fill="#58CCFF" opacity="0.15"/>
</svg>
