  <line x1="42" y1="70" x2="42" y2="74" stroke="#58CCFF" stroke-width="2.5"/>
  <line x1="54" y1="70" x2="54" y2="74" stroke="#58CCFF" stroke-width="2.5"/>
  <circle cx="42" cy="76" r="2" fill="#58CCFF" opacity="0.4"/>
  <circle cx="54" cy="76" r="2" fill="#58CCFF" opacity="0.4"/>
  <!-- Step/platform -->
  <rect x="32" y="78" width="36" height="4" rx="1" fill="#1a3a5c" stroke="#2a5a8c" stroke-width="1.5"/>
  <!-- Arrow showing raise -->
